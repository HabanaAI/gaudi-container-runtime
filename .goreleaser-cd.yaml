dockers:
  - id: "{{ .ProjectName }}"
    goos: linux
    goarch: amd64
    ids:
      - habana-container-runtime
      - habana-container-hook
      - habana-container-cli
      - habana-container-toolkit
    image_templates:
      - "{{ .ProjectName }}:{{ .Version }}"
    use: docker
    skip_push: true
    dockerfile: packaging/Dockerfile
    build_flag_templates:
      - "--label=org.opencontainers.image.vendor='Intel Corp.'"
      - "--label=org.opencontainers.image.title='Habana Container Runtime'"
      - "--label=org.opencontainers.image.description='Provides a container runtime allowing users to run Intel® Gaudi® AI Accelerator enabled containers.'"
      - "--label=org.opencontainers.image.version='{{ .Version }}'"
      - "--label=org.opencontainers.image.created='{{ .Date }}'"
      - "--label=org.opencontainers.image.source='https://github.com/HabanaAI/gaudi-bmc-exporter'"
      - "--label=org.opencontainers.image.licenses='Apache-2.0'"
      - "--build-arg=HTTP_PROXY={{.Env.HTTP_PROXY}}"
      - "--build-arg=HTTPS_PROXY={{.Env.HTTPS_PROXY}}"
      - "--build-arg=NO_PROXY={{.Env.NO_PROXY}}"
    extra_files:
      - packaging/config.toml
      - packaging/oci-habana-hook
      - packaging/oci-habana-hook.json
      - LICENSE
      - licenses
